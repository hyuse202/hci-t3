<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Định tuyến nhà ga T3 - Sân bay Tân Sơn Nhất</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <h1>🚏 Định tuyến nhà ga T3</h1>
    <p class="subtitle">Sân bay Quốc tế Tân Sơn Nhất — Prototype HCI</p>
  </header>

  <div class="app-layout">

    <!-- Panel bên trái -->
    <aside class="side-panel">
      <div class="panel-section">
        <h3>📍 Chọn tuyến</h3>
        <div class="route-form">
          <label>Điểm đi</label>
          <select id="from-select">
            <option value="">— Chọn điểm đi —</option>
          </select>

          <label>Điểm đến</label>
          <select id="to-select">
            <option value="">— Chọn điểm đến —</option>
          </select>

          <button id="find-route-btn" class="btn-primary">🚶 Tìm đường</button>
          <button id="clear-route-btn" class="btn-secondary">🗑️ Xoá</button>
        </div>
      </div>

      <div id="route-info" class="panel-section route-info hidden">
        <h3>📋 Chi tiết tuyến</h3>
        <div id="route-details"></div>
      </div>

      <div class="panel-section">
        <h3>⚙️ Chế độ</h3>
        <label class="toggle-label">
          <input type="checkbox" id="edit-mode-toggle" />
          <span class="toggle-text">🖊️ Chế độ đánh dấu</span>
        </label>
        <p id="edit-mode-hint" class="hint hidden">
          Click vào bản đồ để thêm điểm mới.<br />
          <strong>Kéo thả</strong> marker để điều chỉnh vị trí.<br />
          <strong>Chuột phải</strong> vào marker để xoá.
        </p>
      </div>

      <div class="panel-section" id="manage-points-section">
        <h3>📌 Quản lý điểm</h3>
        <div id="custom-points-list">
          <p class="hint">Chưa có điểm tự đánh dấu.</p>
        </div>
        <button id="clear-all-points-btn" class="btn-secondary" style="margin-top: 8px; font-size: 11px; display: none;">
          🗑️ Xoá tất cả điểm đã đánh
        </button>
        <button id="export-coords-btn" class="btn-secondary" style="margin-top: 6px; font-size: 11px; display: none;">
          📋 Sao chép tọa độ cho trợ lý
        </button>
        <textarea id="export-textarea" style="
          display: none; width: 100%; margin-top: 6px;
          padding: 6px; font-size: 11px; font-family: monospace;
          border: 1px solid #ddd; border-radius: 4px; resize: vertical;
          min-height: 60px; background: #f5f5f5;
        " readonly></textarea>
      </div>
    </aside>

    <!-- Map container -->
    <main class="map-area">

      <!-- Floor selector tabs -->
      <div class="floor-tabs" id="floor-tabs">
        <button class="floor-btn active" data-floor="1">Tầng 1 🛂</button>
        <button class="floor-btn" data-floor="2">Tầng 2 🛍️</button>
        <button class="floor-btn" data-floor="3">Tầng 3 🛫</button>
      </div>

      <div id="map"></div>
    </main>

  </div>

  <!-- JavaScript -->
  <script src="js/app.js"></script>
</body>
</html>
